<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAK · RKA PPEPD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-docx-js/dist/html-docx.js"></script>
</head>
<body>
<div id="app"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const sb = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];

const BLANK_DOC = {
  sub_kegiatan_nama:'Sub Kegiatan Baru', tahun_anggaran:'2027', bidang_urusan:'', program_text:'',
  program_indikator:'', kegiatan_text:'', kegiatan_indikator:'', kegiatan_target:'',
  sub_kegiatan_indikator:'', sub_kegiatan_target:'', sumber_dana:'', alokasi_anggaran:'', lokasi:'',
  latar_belakang:'', dasar_hukum:[], maksud:'', tujuan:[], analisis_dampak:'', keluaran:'',
  metode_pelaksanaan:[], tahapan_kegiatan:[], tempat_pelaksanaan:'',
  pelaksana_kegiatan:'', penanggung_jawab:'', kelompok_sasaran:'', pihak_terkait:'',
  waktu_pelaksanaan:'', jadwal:[], rincian_belanja:[], mitigasi_risiko:[],
  tempat_tanggal:'', ttd_pa_jabatan:'Pengguna Anggaran (PA)', ttd_pa_nama:'', ttd_pa_nip:'',
  ttd_pptk_jabatan:'Penanggung Jawab / PPTK', ttd_pptk_nama:'', ttd_pptk_nip:''
};

let state = {
  session:null, authMode:'login', authError:'',
  bidangList:[], documents:[], openGroups:{},
  activeDocId:null, activeDoc:null, mode:'edit', // 'edit' | 'preview'
  toast:''
};

const $app = document.getElementById('app');
const esc = (s)=> (s??'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = n => { n = Number(n)||0; return 'Rp ' + n.toLocaleString('id-ID'); };

// ================= AUTH =================
sb.auth.getSession().then(({data})=>{ state.session = data.session; boot(); });
sb.auth.onAuthStateChange((_evt, session)=>{ state.session = session; if(session) boot(); else render(); });

async function boot(){
  await loadBidang();
  await loadDocuments();
  render();
}

async function loadBidang(){
  const {data, error} = await sb.from('bidang').select('*').order('nama');
  if(!error) state.bidangList = data || [];
}
async function loadDocuments(){
  const {data, error} = await sb.from('kak_documents').select('*').order('created_at');
  if(!error) state.documents = data || [];
}

async function doLogin(email, pass){
  state.authError='';
  const {error} = await sb.auth.signInWithPassword({email, password:pass});
  if(error){ state.authError = error.message; render(); }
}
async function doRegister(email, pass){
  state.authError='';
  const {error} = await sb.auth.signUp({email, password:pass});
  if(error){ state.authError = error.message; }
  else { state.authError = 'Akun dibuat. Silakan cek email untuk verifikasi (jika diaktifkan), lalu masuk.'; state.authMode='login'; }
  render();
}
async function doLogout(){ await sb.auth.signOut(); state.activeDoc=null; state.activeDocId=null; render(); }

// ================= RENDER ROOT =================
function render(){
  if(!state.session){ renderAuth(); return; }
  renderShell();
}

function renderAuth(){
  const isLogin = state.authMode==='login';
  $app.innerHTML = `
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-seal">KAK</div>
      <h1>${isLogin?'Masuk ke Aplikasi':'Buat Akun Baru'}</h1>
      <p class="sub">Aplikasi Penyusunan KAK / RKA &middot; Perencanaan, Pengendalian &amp; Evaluasi Pembangunan Daerah</p>
      ${state.authError?`<div class="auth-error">${esc(state.authError)}</div>`:''}
      <div class="auth-field"><label>Email</label><input type="email" id="a_email" placeholder="nama@instansi.go.id"></div>
      <div class="auth-field"><label>Kata Sandi</label><input type="password" id="a_pass" placeholder="••••••••"></div>
      <div class="auth-actions">
        <button class="btn btn-primary" id="a_submit">${isLogin?'Masuk':'Daftar'}</button>
      </div>
      <div class="auth-toggle">
        ${isLogin? `Belum punya akun? <a id="a_toggle">Daftar di sini</a>` : `Sudah punya akun? <a id="a_toggle">Masuk di sini</a>`}
      </div>
    </div>
  </div>`;
  document.getElementById('a_toggle').onclick = ()=>{ state.authMode = isLogin?'register':'login'; state.authError=''; render(); };
  document.getElementById('a_submit').onclick = ()=>{
    const email = document.getElementById('a_email').value.trim();
    const pass = document.getElementById('a_pass').value;
    if(!email || !pass){ state.authError='Isi email dan kata sandi terlebih dahulu.'; render(); return; }
    isLogin ? doLogin(email,pass) : doRegister(email,pass);
  };
}

function renderShell(){
  $app.innerHTML = `
  <div class="app-shell">
    <div class="topbar">
      <div class="brand"><span class="mark">KAK</span> KAK &middot; RKA PPEPD</div>
      <div class="user"><span>${esc(state.session.user.email)}</span><button id="btn_logout">Keluar</button></div>
    </div>
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>`;
  document.getElementById('btn_logout').onclick = doLogout;
  renderSidebar();
  renderMain();
}

// ================= SIDEBAR =================
function renderSidebar(){
  const el = document.getElementById('sidebar');
  const groups = state.bidangList.map(b=>{
    const docs = state.documents.filter(d=>d.bidang_id===b.id);
    const open = state.openGroups[b.id] !== false;
    return `
    <div class="bidang-group">
      <div class="bidang-head" data-toggle="${b.id}">
        <span>${esc(b.nama)}</span>
        <span class="count">${docs.length}</span>
      </div>
      ${open? `
      <div class="doc-list">
        ${docs.map(d=>`
          <div class="doc-item ${d.id===state.activeDocId?'active':''}" data-open="${d.id}">
            <span class="dot"></span><span>${esc(d.sub_kegiatan_nama||'(tanpa nama)')}</span>
          </div>`).join('')}
        <button class="doc-add-sub" data-newdoc="${b.id}">+ Sub Kegiatan Baru</button>
      </div>` : ''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <button class="sidebar-add" id="btn_add_bidang">+ Tambah Bidang / SKPD</button>
    ${groups || '<p style="font-size:12.5px;color:var(--ink-soft);">Belum ada Bidang/SKPD. Tambahkan dahulu.</p>'}
  `;

  document.getElementById('btn_add_bidang').onclick = async ()=>{
    const nama = prompt('Nama Bidang / SKPD:');
    if(!nama) return;
    const {data, error} = await sb.from('bidang').insert({nama, created_by:state.session.user.id}).select().single();
    if(error){ alert('Gagal menambah bidang: '+error.message); return; }
    state.bidangList.push(data); render();
  };
  el.querySelectorAll('[data-toggle]').forEach(node=>{
    node.onclick = ()=>{ const id=node.dataset.toggle; state.openGroups[id] = !(state.openGroups[id]!==false); renderSidebar(); };
  });
  el.querySelectorAll('[data-open]').forEach(node=>{
    node.onclick = ()=> openDoc(node.dataset.open);
  });
  el.querySelectorAll('[data-newdoc]').forEach(node=>{
    node.onclick = ()=> createDoc(node.dataset.newdoc);
  });
}

async function createDoc(bidangId){
  const nama = prompt('Nama Sub Kegiatan:', 'Sub Kegiatan Baru');
  if(nama===null) return;
  const payload = {...BLANK_DOC, sub_kegiatan_nama:nama, bidang_id:bidangId, user_id:state.session.user.id};
  const {data, error} = await sb.from('kak_documents').insert(payload).select().single();
  if(error){ alert('Gagal membuat dokumen: '+error.message); return; }
  state.documents.push(data);
  state.activeDocId = data.id; state.activeDoc = data; state.mode='edit';
  renderSidebar(); renderMain();
}

async function openDoc(id){
  const {data, error} = await sb.from('kak_documents').select('*').eq('id', id).single();
  if(error){ alert('Gagal memuat dokumen: '+error.message); return; }
  state.activeDocId = id; state.activeDoc = data; state.mode='edit';
  renderSidebar(); renderMain();
}

// ================= MAIN PANEL =================
function renderMain(){
  const el = document.getElementById('main');
  if(!state.activeDoc){
    el.innerHTML = `<div class="empty-state"><h2>Pilih atau buat Sub Kegiatan</h2><p>Gunakan panel di sebelah kiri untuk memilih dokumen KAK, atau buat Bidang/SKPD dan Sub Kegiatan baru.</p></div>`;
    return;
  }
  if(state.mode==='preview'){ renderPreview(el); }
  else { renderForm(el); }
}

function bidangNama(id){ const b = state.bidangList.find(x=>x.id===id); return b? b.nama : ''; }

    const arr = readRincianFromDOM(); arr.push({uraian:'', volume:'', total:'', sektor:'', keterangan:''}); renderRincianTable(arr);
  };
  document.getElementById('btn_add_mitigasi').onclick = ()=>{
    const arr = readMitigasiFromDOM(); arr.push({uraian:'', tingkat:'Sedang', dampak:'', mitigasi:''}); renderMitigasiTable(arr);

}

// ---------- dynamic table: jadwal ----------
function renderJadwalTable(arr){
  const body = document.getElementById('jadwalBody');
  body.innerHTML = arr.map((row,i)=>`
    <tr>
      <td><input data-f="tahapan" value="${esc(row.tahapan)}"></td>
      ${MONTHS.map((_,mi)=>`<td class="chk"><input type="checkbox" data-m="${mi}" ${row.bulan && row.bulan[mi]?'checked':''}></td>`).join('')}
      <td class="rm"><button class="rm-btn" data-rm="${i}">&times;</button></td>
    </tr>`).join('');
  body.querySelectorAll('[data-rm]').forEach(btn=>{
    btn.onclick = ()=>{ const arr2 = readJadwalFromDOM(); arr2.splice(Number(btn.dataset.rm),1); renderJadwalTable(arr2); };
  });
}
function readJadwalFromDOM(){
  const rows = [...document.querySelectorAll('#jadwalBody tr')];
  return rows.map(tr=>{
    const tahapan = tr.querySelector('[data-f="tahapan"]').value;
    const bulan = [...tr.querySelectorAll('[data-m]')].map(cb=>cb.checked);
    return {tahapan, bulan};
  });
}

// ---------- dynamic table: rincian belanja ----------
function renderRincianTable(arr){
  const body = document.getElementById('rincianBody');
  body.innerHTML = arr.map((row,i)=>`
    <tr>
      <td><input data-f="uraian" value="${esc(row.uraian)}"></td>
      <td><input data-f="volume" value="${esc(row.volume)}"></td>
      <td><input data-f="total" data-numeric value="${esc(row.total)}"></td>
      <td><input data-f="sektor" value="${esc(row.sektor)}"></td>
      <td><input data-f="keterangan" value="${esc(row.keterangan)}"></td>
      <td class="rm"><button class="rm-btn" data-rm="${i}">&times;</button></td>
    </tr>`).join('');
  body.querySelectorAll('[data-rm]').forEach(btn=>{
    btn.onclick = ()=>{ const arr2 = readRincianFromDOM(); arr2.splice(Number(btn.dataset.rm),1); renderRincianTable(arr2); };
  });
  body.querySelectorAll('[data-numeric]').forEach(inp=>{
    inp.addEventListener('input', updateRincianTotal);
  });
  updateRincianTotal();
}
function readRincianFromDOM(){
  const rows = [...document.querySelectorAll('#rincianBody tr')];
  return rows.map(tr=>({
    uraian: tr.querySelector('[data-f="uraian"]').value,
    volume: tr.querySelector('[data-f="volume"]').value,
    total: tr.querySelector('[data-f="total"]').value,
    sektor: tr.querySelector('[data-f="sektor"]').value,
    keterangan: tr.querySelector('[data-f="keterangan"]').value,
  }));
}
function updateRincianTotal(){
  const arr = readRincianFromDOM();
  const sum = arr.reduce((s,r)=> s + (Number(r.total)||0), 0);
  const totalEl = document.getElementById('rincianTotal');
  if(totalEl) totalEl.textContent = 'Total: ' + money(sum);
}

// ---------- dynamic table: mitigasi risiko ----------
function renderMitigasiTable(arr){
  const body = document.getElementById('mitigasiBody');
  body.innerHTML = arr.map((row,i)=>`
    <tr>
      <td><input data-f="uraian" value="${esc(row.uraian)}"></td>
      <td><select data-f="tingkat">
        ${['Rendah','Sedang','Tinggi'].map(t=>`<option ${row.tingkat===t?'selected':''}>${t}</option>`).join('')}
      </select></td>
      <td><input data-f="dampak" value="${esc(row.dampak)}"></td>
      <td><input data-f="mitigasi" value="${esc(row.mitigasi)}"></td>
      <td class="rm"><button class="rm-btn" data-rm="${i}">&times;</button></td>
    </tr>`).join('');
  body.querySelectorAll('[data-rm]').forEach(btn=>{
    btn.onclick = ()=>{ const arr2 = readMitigasiFromDOM(); arr2.splice(Number(btn.dataset.rm),1); renderMitigasiTable(arr2); };
  });
}
function readMitigasiFromDOM(){
  const rows = [...document.querySelectorAll('#mitigasiBody tr')];
  return rows.map(tr=>({
    uraian: tr.querySelector('[data-f="uraian"]').value,
    tingkat: tr.querySelector('[data-f="tingkat"]').value,
    dampak: tr.querySelector('[data-f="dampak"]').value,
    mitigasi: tr.querySelector('[data-f="mitigasi"]').value,
  }));
}

// ================= GATHER / SAVE / DELETE =================
function splitLines(v){ return v.split('\n').map(s=>s.trim()).filter(Boolean); }
function val(id){ const n = document.getElementById(id); return n ? n.value : ''; }

function gatherFormData(){
  return {
    sub_kegiatan_nama: val('f_sub_kegiatan_nama'),
    tahun_anggaran: val('f_tahun_anggaran'),
    bidang_urusan: val('f_bidang_urusan'),
    program_text: val('f_program_text'),
    program_indikator: val('f_program_indikator'),
    kegiatan_text: val('f_kegiatan_text'),
    kegiatan_indikator: val('f_kegiatan_indikator'),
    kegiatan_target: val('f_kegiatan_target'),
    sub_kegiatan_indikator: val('f_sub_kegiatan_indikator'),
    sub_kegiatan_target: val('f_sub_kegiatan_target'),
    sumber_dana: val('f_sumber_dana'),
    alokasi_anggaran: val('f_alokasi_anggaran'),
    lokasi: val('f_lokasi'),
    latar_belakang: val('f_latar_belakang'),
    dasar_hukum: splitLines(val('f_dasar_hukum')),
    maksud: val('f_maksud'),
    tujuan: splitLines(val('f_tujuan')),
    analisis_dampak: val('f_analisis_dampak'),
    keluaran: val('f_keluaran'),
    metode_pelaksanaan: splitLines(val('f_metode_pelaksanaan')),
    tahapan_kegiatan: splitLines(val('f_tahapan_kegiatan')),
    tempat_pelaksanaan: val('f_tempat_pelaksanaan'),
    pelaksana_kegiatan: val('f_pelaksana_kegiatan'),
    penanggung_jawab: val('f_penanggung_jawab'),
    kelompok_sasaran: val('f_kelompok_sasaran'),
    pihak_terkait: val('f_pihak_terkait'),
    waktu_pelaksanaan: val('f_waktu_pelaksanaan'),
    jadwal: readJadwalFromDOM(),
    rincian_belanja: readRincianFromDOM(),
    mitigasi_risiko: readMitigasiFromDOM(),
    tempat_tanggal: val('f_tempat_tanggal'),
    ttd_pa_jabatan: val('f_ttd_pa_jabatan'),
    ttd_pa_nama: val('f_ttd_pa_nama'),
    ttd_pa_nip: val('f_ttd_pa_nip'),
    ttd_pptk_jabatan: val('f_ttd_pptk_jabatan'),
    ttd_pptk_nama: val('f_ttd_pptk_nama'),
    ttd_pptk_nip: val('f_ttd_pptk_nip'),
  };
}

async function saveActiveDoc(goPreview){
  const data = gatherFormData();
  const {data:updated, error} = await sb.from('kak_documents').update(data).eq('id', state.activeDocId).select().single();
  if(error){ alert('Gagal menyimpan: '+error.message); return; }
  state.activeDoc = updated;
  const idx = state.documents.findIndex(x=>x.id===updated.id);
  if(idx>-1) state.documents[idx] = updated;
  state.mode = goPreview ? 'preview' : 'edit';
  renderSidebar(); renderMain();
}

async function deleteActiveDoc(){
  if(!confirm('Hapus dokumen "'+state.activeDoc.sub_kegiatan_nama+'" secara permanen?')) return;
  const {error} = await sb.from('kak_documents').delete().eq('id', state.activeDocId);
  if(error){ alert('Gagal menghapus: '+error.message); return; }
  state.documents = state.documents.filter(x=>x.id!==state.activeDocId);
  state.activeDoc=null; state.activeDocId=null;
  renderSidebar(); renderMain();
}

// ================= PREVIEW / EXPORT =================
function renderPreview(el){
  const d = state.activeDoc;
  el.innerHTML = `
    <div class="doc-title-row">
      <h1>${esc(d.sub_kegiatan_nama)}</h1>
      <div class="doc-actions">
        <button class="btn btn-ghost" id="btn_back_edit">&larr; Kembali Edit</button>
        <button class="btn btn-ghost" id="btn_export_pdf">Export PDF</button>
        <button class="btn btn-brass" id="btn_export_docx">Export Word (.docx)</button>
      </div>
    </div>
    <div class="doc-page" id="docPage">${documentHTML(d)}</div>
  `;
  document.getElementById('btn_back_edit').onclick = ()=>{ state.mode='edit'; renderMain(); };
  document.getElementById('btn_export_pdf').onclick = ()=> exportPDF(d);
  document.getElementById('btn_export_docx').onclick = ()=> exportDOCX(d);
}

function exportPDF(d){
  const el = document.getElementById('docPage');
  const opt = {
    margin: 10,
    filename: `KAK_${(d.sub_kegiatan_nama||'dokumen').replace(/[^a-z0-9]+/gi,'_')}.pdf`,
    image:{type:'jpeg', quality:0.98},
    html2canvas:{scale:2, useCORS:true},
    jsPDF:{unit:'mm', format:'a4', orientation:'portrait'}
  };
  window.html2pdf().set(opt).from(el).save();
}

function exportDOCX(d){
  const bodyHtml = documentHTML(d);
  const fullHtml = `<!DOCTYPE html><html><head><meta charset="utf-8"><style>
    body{font-family:Georgia,serif;font-size:12pt;color:#111;}
    h2.title{text-align:center;font-size:14pt;} p.center{text-align:center;margin:2px 0;font-size:11pt;}
    table{width:100%;border-collapse:collapse;} td,th{border:1px solid #333;padding:5px 8px;font-size:10.5pt;}
    td.k{width:34%;font-weight:bold;background:#F5F5F3;} h3.sec{text-decoration:underline;font-size:11.5pt;}
    .sign-grid{width:100%;} table.grid th{background:#F5F5F3;text-align:center;} .c{text-align:center;}
  </style></head><body>${bodyHtml}</body></html>`;
  const blob = window.htmlDocx.asBlob(fullHtml);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `KAK_${(d.sub_kegiatan_nama||'dokumen').replace(/[^a-z0-9]+/gi,'_')}.docx`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
